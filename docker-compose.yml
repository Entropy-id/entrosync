services:
  postgres:
    image: postgres:16
    container_name: entrosync_db
    restart: always
    environment:
      POSTGRES_USER: entrosync
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: entrosync_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: