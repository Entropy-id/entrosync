name: "CI"

on:
  pull_request:
    branches:
      - development

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      
      - name: Install deps
        run: npm ci
      
      - name: Biome check
        run: npm run check
      
      - name: Build app
        run: npm run build